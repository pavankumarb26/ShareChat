<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat app</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1 class="title">Chat</h1>

    <div class="main">
        <div class="name">
            <span><i class = "far fa-user"></i></span>
            <input type="text"
             id="name-input"
             class="name-input" 
             value="anonymous"
             maxlength="20"
             />
        </div>
        <ul class="message-container" id="message-container">
        

            <li class="message-right">
            <p class="message">
            lorem impsun
            <span>bluebird • 26 July 10:40</span>
            </p>
        </li>

        </ul>
        <form class="message-form" id="message-form">
            <input type="text" name="message" id="message-input" class="message-input">
            <div class="v-divider"></div>
            <button type="submit" class="send-button">
            send <span><i class="fa-solid fa-paper-plane"></i></span>
            </button>
        </form>

    </div>
    <h3 class="clients-total" id="clients-total"></h3>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
